<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPL - Social Profile Lookup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 2rem; margin-bottom: 8px; color: #f8fafc; }
        .subtitle { color: #94a3b8; margin-bottom: 32px; }
        .search-form { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 32px; }
        label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
        input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 1rem; margin-bottom: 16px; }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; }
        textarea { resize: vertical; min-height: 80px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; font-weight: 600; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .toggle-links { background: none; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; font-size: 0.85rem; margin-bottom: 16px; width: auto; cursor: pointer; border-radius: 6px; }
        .toggle-links:hover { border-color: #3b82f6; color: #e2e8f0; background: none; }
        .links-section { display: none; margin-bottom: 16px; padding: 16px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; }
        .links-section.open { display: block; }
        .links-section .hint { color: #64748b; font-size: 0.8rem; margin-bottom: 12px; }
        .links-section input { margin-bottom: 10px; font-size: 0.875rem; padding: 8px 12px; }
        .links-section label { font-size: 0.8rem; margin-bottom: 4px; }
        .spinner { display: none; text-align: center; padding: 40px; color: #94a3b8; }
        .spinner.active { display: block; }
        .spinner .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; margin: 0 4px; animation: bounce 1.4s infinite ease-in-out both; }
        .spinner .dot:nth-child(1) { animation-delay: -0.32s; }
        .spinner .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .stats { color: #64748b; font-size: 0.875rem; margin-bottom: 16px; }
        .results { display: flex; flex-direction: column; gap: 16px; }
        .profile-card { background: #1e293b; border-radius: 12px; padding: 20px; border-left: 4px solid #3b82f6; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .platform-badge { background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .score { font-size: 1.5rem; font-weight: 700; }
        .score.high { color: #22c55e; }
        .score.medium { color: #eab308; }
        .score.low { color: #ef4444; }
        .profile-url { color: #3b82f6; text-decoration: none; font-size: 0.875rem; word-break: break-all; }
        .profile-url:hover { text-decoration: underline; }
        .profile-bio { color: #94a3b8; font-size: 0.875rem; margin: 8px 0; line-height: 1.5; }
        .profile-reasoning { color: #64748b; font-size: 0.8rem; font-style: italic; margin-top: 8px; border-top: 1px solid #334155; padding-top: 8px; }
        .display-name { font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
        .no-results { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPL</h1>
        <p class="subtitle">Social Profile Lookup</p>

        <div class="search-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="e.g. Jane Doe / ג'יין דו" />
            <label for="description">Description</label>
            <textarea id="description" placeholder="e.g. Software engineer at Google, based in San Francisco"></textarea>

            <button type="button" class="toggle-links" onclick="toggleLinks()">Have a profile link? Add it to speed up search</button>

            <div class="links-section" id="linksSection">
                <p class="hint">Adding a known profile link speeds up the search and improves accuracy for other platforms.</p>
                <label>X / Twitter</label>
                <input type="text" id="link_x" placeholder="https://x.com/username" />
                <label>Facebook</label>
                <input type="text" id="link_facebook" placeholder="https://facebook.com/username" />
                <label>Instagram</label>
                <input type="text" id="link_instagram" placeholder="https://instagram.com/username" />
                <label>TikTok</label>
                <input type="text" id="link_tiktok" placeholder="https://tiktok.com/@username" />
                <label>LinkedIn</label>
                <input type="text" id="link_linkedin" placeholder="https://linkedin.com/in/username" />
            </div>

            <button id="searchBtn" onclick="search()">Search</button>
        </div>

        <div class="spinner" id="spinner">
            <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            <p style="margin-top: 16px;">Searching profiles and verifying matches...</p>
        </div>

        <div id="stats" class="stats"></div>
        <div id="results" class="results"></div>
    </div>

    <script>
        function toggleLinks() {
            document.getElementById('linksSection').classList.toggle('open');
        }

        async function search() {
            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            if (!name || !description) return;

            const btn = document.getElementById('searchBtn');
            const spinner = document.getElementById('spinner');
            const resultsDiv = document.getElementById('results');
            const statsDiv = document.getElementById('stats');

            btn.disabled = true;
            spinner.classList.add('active');
            resultsDiv.innerHTML = '';
            statsDiv.textContent = '';

            const body = {
                name,
                description,
                link_x: document.getElementById('link_x').value.trim(),
                link_facebook: document.getElementById('link_facebook').value.trim(),
                link_instagram: document.getElementById('link_instagram').value.trim(),
                link_tiktok: document.getElementById('link_tiktok').value.trim(),
                link_linkedin: document.getElementById('link_linkedin').value.trim(),
            };

            try {
                const resp = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await resp.json();

                statsDiv.textContent = `Found ${data.total_found} profiles | ${data.profiles.length} verified matches | ${data.elapsed_seconds}s`;

                if (data.profiles.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">No verified matches found. Try adjusting the description or adding a known profile link.</div>';
                } else {
                    resultsDiv.innerHTML = data.profiles.map(p => {
                        const scoreClass = p.score >= 80 ? 'high' : p.score >= 60 ? 'medium' : 'low';
                        return `
                            <div class="profile-card">
                                <div class="card-header">
                                    <span class="platform-badge">${p.platform}</span>
                                    <span class="score ${scoreClass}">${p.score}%</span>
                                </div>
                                ${p.display_name ? `<div class="display-name">${esc(p.display_name)}</div>` : ''}
                                <a class="profile-url" href="${p.url}" target="_blank">${p.url}</a>
                                ${p.bio ? `<div class="profile-bio">${esc(p.bio)}</div>` : ''}
                                <div class="profile-reasoning">${esc(p.reasoning)}</div>
                            </div>`;
                    }).join('');
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="no-results">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                spinner.classList.remove('active');
            }
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
    </script>
</body>
</html>
